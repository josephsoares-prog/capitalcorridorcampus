<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240">

  <!-- Crescent C Symbol — three concentric open arcs forming a stylized C -->
  <g transform="translate(80, 120)">
    <path d="M 30,-65 A 70,70 0 1,0 30,65" fill="none" stroke="#C6A25A" stroke-width="7" stroke-linecap="round"/>
    <path d="M 22,-48 A 52,52 0 1,0 22,48" fill="none" stroke="#C6A25A" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M 14,-31 A 34,34 0 1,0 14,31" fill="none" stroke="#C6A25A" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Main Text — CAMPUS CORRIDOR DE LA CAPITALE stacked -->
  <text x="195" y="55" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="700" font-size="39" fill="#C6A25A" letter-spacing="4">CAMPUS</text>
  <text x="195" y="98" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="700" font-size="39" fill="#C6A25A" letter-spacing="4">CORRIDOR</text>
  <text x="195" y="141" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="700" font-size="39" fill="#C6A25A" letter-spacing="4">DE LA CAPITALE</text>

  <!-- Divider line -->
  <line x1="195" y1="160" x2="660" y2="160" stroke="#C6A25A" stroke-width="0.8" opacity="0.45"/>

  <!-- Tagline -->
  <text x="195" y="188" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="400" font-size="12" fill="#C6A25A" letter-spacing="2.5" opacity="0.8">OÙ GOUVERNEMENT ET INNOVATION SE RENCONTRENT</text>

</svg>
