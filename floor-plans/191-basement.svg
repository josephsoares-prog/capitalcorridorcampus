<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #F5F3EE; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #F5F3EE; }
      .legend-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #F5F3EE; }
      .space-fill { fill: #F5F3EE; opacity: 0.1; }
      .outline { stroke: #C6A25A; stroke-width: 2; fill: none; }
      .core { stroke: #C6A25A; stroke-width: 2; fill: none; }
      .wall { stroke: #C6A25A; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0A0F1A"/>

  <!-- Title Bar -->
  <rect width="800" height="50" fill="#1B3154"/>
  <text x="20" y="32" class="title">191 Promenade du Portage — Basement</text>
  <text x="600" y="32" class="title" text-anchor="end">~3,200 sq ft</text>

  <!-- Floor Outline (rectangular) -->
  <rect x="60" y="80" width="680" height="350" class="wall"/>

  <!-- Entrance Vestibule (left side) -->
  <rect x="60" y="80" width="80" height="80" class="space-fill"/>
  <rect x="60" y="80" width="80" height="80" class="outline"/>
  <text x="100" y="130" class="label" text-anchor="middle">Entrance</text>

  <!-- Corridor (running east-west through center) -->
  <rect x="140" y="180" width="600" height="70" class="space-fill"/>
  <rect x="140" y="180" width="600" height="70" class="outline"/>
  <text x="440" y="220" class="label" text-anchor="middle">Main Corridor</text>

  <!-- Elevator/Stair Core (center) -->
  <g>
    <rect x="350" y="200" width="100" height="90" class="core"/>
    <text x="375" y="235" class="label" text-anchor="middle">Elevator</text>
    <text x="425" y="235" class="label" text-anchor="middle">Stairs</text>
  </g>

  <!-- Washrooms (left of core) -->
  <rect x="280" y="200" width="60" height="90" class="space-fill"/>
  <rect x="280" y="200" width="60" height="90" class="outline"/>
  <text x="310" y="250" class="label" text-anchor="middle">Washrooms</text>

  <!-- Mechanical/Storage (right of core) -->
  <rect x="460" y="200" width="100" height="90" class="space-fill"/>
  <rect x="460" y="200" width="100" height="90" class="outline"/>
  <text x="510" y="250" class="label" text-anchor="middle">Mechanical</text>

  <!-- Open Collaborative Space (upper left) -->
  <rect x="60" y="80" width="220" height="100" class="space-fill"/>
  <rect x="60" y="80" width="220" height="100" class="outline"/>
  <text x="170" y="110" class="label" text-anchor="middle">Renovated</text>
  <text x="170" y="125" class="label" text-anchor="middle">Open Space</text>

  <!-- Storage/Archive (bottom left) -->
  <rect x="60" y="320" width="150" height="110" class="space-fill"/>
  <rect x="60" y="320" width="150" height="110" class="outline"/>
  <text x="135" y="375" class="label" text-anchor="middle">Storage</text>

  <!-- Additional Storage (bottom center) -->
  <rect x="220" y="320" width="130" height="110" class="space-fill"/>
  <rect x="220" y="320" width="130" height="110" class="outline"/>
  <text x="285" y="375" class="label" text-anchor="middle">Archive</text>

  <!-- Utility/Infrastructure (bottom right) -->
  <rect x="370" y="320" width="190" height="110" class="space-fill"/>
  <rect x="370" y="320" width="190" height="110" class="outline"/>
  <text x="465" y="365" class="label" text-anchor="middle">Building Systems</text>
  <text x="465" y="380" class="label" text-anchor="middle">& Infrastructure</text>

  <!-- Secure Access Room (far right) -->
  <rect x="580" y="320" width="160" height="110" class="space-fill"/>
  <rect x="580" y="320" width="160" height="110" class="outline"/>
  <text x="660" y="375" class="label" text-anchor="middle">Secure Storage</text>

  <!-- Legend -->
  <g>
    <rect x="20" y="450" width="760" height="40" fill="none" stroke="#C6A25A" stroke-width="1"/>
    <text x="30" y="468" class="legend-label">LEGEND:</text>
    <rect x="120" y="454" width="12" height="12" class="space-fill" stroke="#C6A25A" stroke-width="0.5"/>
    <text x="138" y="463" class="legend-label">Configurable Space</text>
    <line x1="310" y1="460" x2="325" y2="460" stroke="#C6A25A" stroke-width="2"/>
    <text x="335" y="463" class="legend-label">Building Boundary</text>
    <rect x="540" y="454" width="12" height="12" fill="none" stroke="#C6A25A" stroke-width="2"/>
    <text x="558" y="463" class="legend-label">Core (Elevator/Stairs/Mechanical)</text>
  </g>
</svg>
